<div class="dashboard-wrapper">
  <app-navbar [user]="user"></app-navbar>

  <div class="main-layout">
    <app-sidebar [idSector]="user.idSector"></app-sidebar>

    <main class="content-area" [ngSwitch]="user.idSector">
      
      <app-direccion-dash *ngSwitchCase="1"></app-direccion-dash>

      <app-it-dash *ngSwitchCase="3"></app-it-dash>

      <app-monitoreo-dash *ngSwitchCase="4" [abonados]="abonados"></app-monitoreo-dash>

      <div *ngSwitchDefault class="error-view">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Sector no reconocido. Contacte a soporte IT.</p>
      </div>

    </main>
  </div>
</div>
