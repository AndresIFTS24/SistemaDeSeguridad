<div class="dashboard-wrapper">
  <app-navbar [user]="user"></app-navbar>

  <div class="main-layout">
    <app-sidebar [idSector]="user.idSector"></app-sidebar>

    <main class="content-area" [ngSwitch]="user.idSector">
      
      <app-direccion-dash 
        *ngSwitchCase="1">
      </app-direccion-dash>

      <app-it-dash 
        *ngSwitchCase="3">
      </app-it-dash>

      <app-monitoreo-dash 
        *ngSwitchCase="4" 
        [abonados]="abonados">
      </app-monitoreo-dash>

      <div *ngSwitchDefault class="error-view">
        <div class="error-card">
          <i class="fas fa-exclamation-circle"></i>
          <h3>Acceso Restringido</h3>
          <p>Tu sector (ID: {{ user.idSector }}) no tiene un panel de control configurado.</p>
          <button (click)="logout()" class="btn-retry">Cerrar Sesión</button>
        </div>
      </div>

    </main>
  </div>
</div>
