<div class="fade-in">

  <!-- BUSCADOR + ACCIONES -->
  <div class="toolbar">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="filtroBusqueda"
        (keyup)="filtrar()"
        placeholder="Buscar por razón social, número o email..."
      />
    </div>
    <button class="btn-nuevo" (click)="abrirNuevo()">
      <i class="fas fa-plus"></i> Nuevo Abonado
    </button>
  </div>

  <!-- TABLA ABONADOS -->
  <div class="tabla-container">
    <table class="direccion-table">
      <thead>
        <tr>
          <th>Nro</th>
          <th>Razón Social</th>
          <th>Contacto</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of abonadosFiltrados">
          <td><span class="id-badge">{{ a.NumeroDeAbonado }}</span></td>
          <td><span class="nombre-text">{{ a.RazonSocial }}</span></td>
          <td>{{ a.ContactoPrincipal }}</td>
          <td>{{ a.TelefonoContacto }}</td>
          <td><span class="email-text">{{ a.EmailContacto }}</span></td>
          <td>
            <span class="estado-pill" [ngClass]="a.Activo ? 'activo' : 'inactivo'">
              <span class="dot"></span>
              {{ a.Activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td>
            <div class="acciones">
              <button class="btn-ver" (click)="verDetalle(a)" title="Ver detalle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <button class="btn-editar" (click)="abrirEditar(a)" title="Editar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-desactivar" (click)="desactivarAbonado(a)" title="Desactivar" *ngIf="a.Activo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="abonadosFiltrados.length === 0">
          <td colspan="7" class="empty-row">No se encontraron abonados.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<app-abonado-form-modal
  [visible]="mostrarModal"
  [modo]="modoModal"
  [abonado]="abonadoSeleccionado"
  (cerrado)="cerrarModal()"
  (guardado)="onGuardado()">
</app-abonado-form-modal>
