<div class="buscador-predictivo">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="11" cy="11" r="8"/>
    <path d="m21 21-4.35-4.35"/>
  </svg>
  <input
    type="text"
    [ngModel]="termino"
    (ngModelChange)="cambiarTermino($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    [placeholder]="placeholder"
  />
  <ul class="sugerencias" *ngIf="mostrarSugerencias">
    <li *ngFor="let item of sugerencias" (click)="elegir(item)">
      <span class="principal">{{ item[campoPrincipal] }}</span>
      <span class="secundario">{{ item[campoSecundario] }}</span>
    </li>
  </ul>
</div>
